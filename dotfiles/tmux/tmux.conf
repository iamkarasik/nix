# Position of tmux bar
set-option -g status-position top

# Remap leader from ctrl-b to ctrl-a
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Enable going to beginning of line
bind C-a send-prefix

# vi mode
set-window-option -g mode-keys vi

# Mouse support: scroll, click panes/windows, drag to resize
set -g mouse on

# Let tmux guess the window name from the current command, but keep a
# manual rename sticky (tmux disables automatic-rename per-window after
# `rename-window` is invoked manually). allow-rename off blocks apps
# (e.g. claude) from overriding the name via escape sequences.
set -g allow-rename off
set -g automatic-rename on

# Update clock every second
set -g status-interval 1

# Don't truncate session name or right status
set -g status-left-length 50
set -g status-right-length 80

# Escape time 10ms (avoids lag in nvim)
set -sg escape-time 10

# Resize pane using prefix-{h,j,k,l}
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

# Switch pane using {h,j,k,l}
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g default-terminal "alacritty"
set -sg terminal-overrides "*:RGB"
set -ag terminal-features ",alacritty:usstyle"

set-option -g history-limit 1000000

source-file ~/.config/tmux/themes/vscode.sh

